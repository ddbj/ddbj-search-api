services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ddbj-search-api-${DDBJ_SEARCH_ENV}
    volumes:
      - .:/app:rw
      - app-venv:/app/.venv
      - ${DDBJ_SEARCH_CONVERTER_CONST_PATH:-/home/w3ddbjld/const}:/home/w3ddbjld/const:ro
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      DDBJ_SEARCH_ENV: ${DDBJ_SEARCH_ENV}
      DDBJ_SEARCH_API_URL_PREFIX: ${DDBJ_SEARCH_API_URL_PREFIX}
      DDBJ_SEARCH_API_ES_URL: ${DDBJ_SEARCH_API_ES_URL}
      DDBJ_SEARCH_API_BASE_URL: ${DDBJ_SEARCH_API_BASE_URL}
      DDBJ_SEARCH_API_SOLR_ARSA_BASE_URL: ${DDBJ_SEARCH_API_SOLR_ARSA_BASE_URL:-}
      DDBJ_SEARCH_API_SOLR_ARSA_SHARDS: ${DDBJ_SEARCH_API_SOLR_ARSA_SHARDS:-}
      DDBJ_SEARCH_API_SOLR_ARSA_CORE: ${DDBJ_SEARCH_API_SOLR_ARSA_CORE:-collection1}
      DDBJ_SEARCH_API_SOLR_TXSEARCH_URL: ${DDBJ_SEARCH_API_SOLR_TXSEARCH_URL:-}
    working_dir: /app
    command: ${DDBJ_SEARCH_API_COMMAND}
    networks:
      - ddbj-search-network
    init: true

networks:
  ddbj-search-network:
    name: ddbj-search-network-${DDBJ_SEARCH_ENV}
    external: true

volumes:
  app-venv:
    driver: local
